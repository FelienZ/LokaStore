<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LokaStore!</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Ancizar+Serif:ital,wght@0,300..900;1,300..900&family=Cal+Sans&family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&family=Montserrat:ital,wght@0,100..900;1,100..900&family=Oswald:wght@200..700&family=Outfit:wght@100..900&family=Roboto:ital,wght@0,100..900;1,100..900&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>
    <div class="container">
        <header>
        <div class="text">LokaStore!</div>
        <input type="text" placeholder="Cari Barang.." id="search">
        <button class="go"><i class="fa-solid fa-magnifying-glass"></i></button> 
        </header>
        <main class="cards">
            <div class="card card-1" id="men's clothing">
                Menswear
                <div class="image"><img src="pic/smiling-man-in-denim-jacket-and-jeans-free.png" alt=""></div>
            </div>
            <div class="card card-2" id="jewelery">
                Jewelery
                <div class="image"><img src="pic/pngimg.com - necklace_PNG32.png" alt=""></div>
            </div>
            <div class="card card-3" id="electronics">
                Electronics
                <div class="image"><img src="pic/iphone13pro-black.png" alt=""></div>
            </div>
            <div class="card card-4" id="women's clothing">
                Womenswear
                <div class="image"><img src="pic/smiling-woman-wearing-white-t-shirt.png" alt=""></div>
            </div>
        </main>
        <div class="list">
            
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
